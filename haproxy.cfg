global
  daemon
  maxconn 4096

defaults
  mode http
  log global
  option httplog
  option dontlognull
  option http-server-close
  option forwardfor
  timeout connect 5s
  timeout client 50s
  timeout server 50s
  # Long timeout for WebSocket tunnels after HTTP upgrade.
  timeout tunnel 1h

frontend stats
  bind *:8404
  stats enable
  stats uri /
  stats refresh 5s

frontend web
  bind *:8080
  default_backend parabola_nodes

backend parabola_nodes
  balance roundrobin
  # Cookie-based sticky sessions: HAProxy inserts a SERVERID cookie
  # pinning each client to one node (required because per-socket ctx
  # and WS subscriptions live in-process on a single node).
  cookie SERVERID insert indirect nocache
  option httpchk
  http-check send meth GET uri / ver HTTP/1.1 hdr Host localhost
  http-check expect status 200
  server node1 host.docker.internal:3000 check inter 2s fall 3 rise 2 cookie node1
  server node2 host.docker.internal:3001 check inter 2s fall 3 rise 2 cookie node2
