services:
  redis:
    image: redis:7-alpine
    container_name: parabola-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 2s
      retries: 10

  postgres:
    image: postgres:17-alpine
    container_name: parabola-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: parabola
      POSTGRES_PASSWORD: parabola
      POSTGRES_DB: parabola
    volumes:
      - parabola-pg-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parabola -d parabola"]
      interval: 2s
      timeout: 3s
      retries: 20

  haproxy:
    image: haproxy:2.9-alpine
    container_name: parabola-haproxy
    depends_on:
      - redis
      - postgres
    ports:
      - "8080:8080"
      - "8404:8404"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    extra_hosts:
      # Lets HAProxy reach the bun nodes running on the host (Linux compat).
      - "host.docker.internal:host-gateway"

volumes:
  parabola-pg-data:
